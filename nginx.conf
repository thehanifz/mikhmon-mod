server {
    listen 999;
    server_name localhost;

    index index.php index.html;
    root /var/www/;

    # ── Security Headers ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── Blok akses ke file sensitif ───────────────────────
    location ~ /\.(env|git|htaccess|ratelimit) {
        deny all;
        return 404;
    }

    # Blok akses langsung ke folder sensitif
    location ~ ^/(include|lib|process|backup_v7)/ {
        deny all;
        return 404;
    }

    # Blok akses ke file config & backup
    location ~ \.(bak|backup|old|sql|log)$ {
        deny all;
        return 404;
    }

    # ── PHP Handler ───────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass php_7_4:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
        fastcgi_intercept_errors on;

        # Pass environment variables ke PHP
        fastcgi_param MIKHMON_SECRET $upstream_http_mikhmon_secret;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Sembunyikan versi nginx
    server_tokens off;
}
